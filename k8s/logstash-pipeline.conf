input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Drop health-check noise from logs
  if [request] == "/health" {
    drop { }
  }

  mutate {
    add_field => { "environment" => "production" }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "aios-microservices-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
  }
  stdout { codec => rubydebug }
}
