version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mktg_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marketing_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marketing_secret}
      POSTGRES_DB: ${POSTGRES_DB:-marketing_ai_db}
    ports:
      - "5432:5432"
    volumes:
      - mktg_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mktg_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - mktg_redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mktg_qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - mktg_qdrant_data:/qdrant/storage

  api:
    build: .
    container_name: mktg_api
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-marketing_user}:${POSTGRES_PASSWORD:-marketing_secret}@db:5432/${POSTGRES_DB:-marketing_ai_db}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - db
      - redis
      - qdrant
    volumes:
      - .:/app

  celery_worker:
    build: .
    container_name: mktg_worker
    restart: always
    command: celery -A worker.celery_worker.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-marketing_user}:${POSTGRES_PASSWORD:-marketing_secret}@db:5432/${POSTGRES_DB:-marketing_ai_db}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - db
      - redis
      - qdrant
    volumes:
      - .:/app

volumes:
  mktg_pg_data:
  mktg_redis_data:
  mktg_qdrant_data:
